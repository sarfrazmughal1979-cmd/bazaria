# Security
security:
  jwt:
    secret: ${JWT_SECRET:myVeryLongSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024}
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000

# AWS Configuration
cloud:
  aws:
    region: ${AWS_REGION:ap-southeast-1}
    s3:
      bucket-name: ${S3_BUCKET:ecommerce-platform-assets}
      region: ${AWS_REGION:ap-southeast-1}
    credentials:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}

# Platform Settings
platform:
  default-currency: PKR
  default-commission-rate: 10
  max-products-per-vendor: 10000
  order-auto-cancel-hours: 24
  settlement-cycle-days: 7

# Elasticsearch
elasticsearch:
  host: https://my-elasticsearch-project-ab19d9.es.us-central1.gcp.elastic.cloud
  port: 443

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.platform: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.hibernate.orm.jdbc.bind: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
debug: true
# === Pakistan Courier API Credentials (configure per environment) ===
tcs:
  api-key: ${TCS_API_KEY:}
  api-password: ${TCS_API_PASSWORD:}
  api-base-url: ${TCS_API_BASE_URL:https://apis.tcs.com.pk/ecod}
  test-mode: ${TCS_TEST_MODE:true}

leopard:
  api-key: ${LEOPARD_API_KEY:}
  api-password: ${LEOPARD_API_PASSWORD:}
  api-base-url: ${LEOPARD_API_BASE_URL:https://api.leopardscourier.com}
  test-mode: ${LEOPARD_TEST_MODE:true}

callcourier:
  api-key: ${CALLCourier_API_KEY:}
  api-password: ${CALLCourier_API_PASSWORD:}
  api-base-url: ${CALLCourier_API_BASE_URL:https://api.callcourier.com.pk}
  test-mode: ${CALLCourier_TEST_MODE:true}

# === JazzCash Payment Gateway ===
jazzcash:
  merchant-id: ${JAZZCASH_MERCHANT_ID:}
  password: ${JAZZCASH_PASSWORD:}
  integrity-salt: ${JAZZCASH_INTEGRITY_SALT:}
  api-base-url: ${JAZZCASH_API_BASE_URL:https://sandbox.jazzcash.com.pk}
  return-url: ${JAZZCASH_RETURN_URL:http://localhost:8080/api/v1/payments/jazzcash/callback}

