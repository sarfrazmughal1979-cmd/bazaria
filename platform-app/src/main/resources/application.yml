spring:
  application:
    name: ecommerce-platform

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Mughal12}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

  cache:
    type: redis

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# Security
security:
  jwt:
    secret: ${JWT_SECRET:myVeryLongSecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong2024}
    access-token-expiration: 3600000
    refresh-token-expiration: 604800000

# AWS Configuration
cloud:
  aws:
    region: ${AWS_REGION:ap-southeast-1}
    s3:
      bucket-name: ${S3_BUCKET:ecommerce-platform-assets}
      region: ${AWS_REGION:ap-southeast-1}
    credentials:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}

# Platform Settings
platform:
  default-currency: BDT
  default-commission-rate: 10
  max-products-per-vendor: 10000
  order-auto-cancel-hours: 24
  settlement-cycle-days: 7

# Elasticsearch
elasticsearch:
  host: ${ES_HOST:localhost}
  port: ${ES_PORT:9200}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.platform: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha