name: Deploy to EC2

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.1.0'

      - name: Build with Gradle
        run: gradle :platform-app:bootJar

      - name: Copy JAR and restart service
        run: |
          cp platform-app/build/libs/*.jar /home/ec2-user/app.jar
          sudo systemctl restart ecommerce
