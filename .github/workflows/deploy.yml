name: Deploy to EC2

on:
  push:
    branches: [ development ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
          
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.1.0'

      - name: Build with Gradle
        run: gradle :platform-app:bootJar

      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: platform-app/build/libs/*.jar
          retention-days: 1
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: /home/ec2-user/

      - name: Move JAR to final location and restart service
        run: |
          # The artifact is downloaded as a file with a versioned name (e.g., platform-app-1.0.0-SNAPSHOT.jar)
          # We rename it to app.jar for the service
          mv /home/ec2-user/platform-app-*.jar /home/ec2-user/app.jar
          sudo systemctl restart ecommerce
