server:
  port: 8080

spring:
  application:
    name: notification-module
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  cache:
    type: redis
    redis:
      time-to-live: 3600000

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB


module:
  iam:
    url: ${IAM_MODULE_URL:http://localhost:8080}
  order:
    url: ${ORDER_MODULE_URL:http://localhost:8080}
  mail:
    host: ${SMTP_HOST:email-smtp.us-east-1.amazonaws.com}
    port: ${SMTP_PORT:587}

# Security
security:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-here-must-be-long-enough}
    access-token-expiration: 3600000    # 1 hour
    refresh-token-expiration: 604800000 # 7 days

# AWS Configuration
cloud:
  aws:
    region: ${AWS_REGION:ap-southeast-1}
    s3:
      bucket: ${S3_BUCKET:ecommerce-platform-assets}
    credentials:
      access-key: ${AWS_ACCESS_KEY:}
      secret-key: ${AWS_SECRET_KEY:}

# Platform Settings
platform:
  default-currency: PKR
  default-commission-rate: 10
  max-products-per-vendor: 10000
  order-auto-cancel-hours: 24
  settlement-cycle-days: 7

# Elasticsearch
elasticsearch:
  host: ${ES_HOST:localhost}
  port: ${ES_PORT:9200}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Logging
logging:
  level:
    com.platform: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha